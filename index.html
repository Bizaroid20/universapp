<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNIVERSE</title>
<meta name="theme-color" content="#e8281e">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans',sans-serif;margin:0;padding:0;background:#0a0000;color:#f5e6e6;min-height:100vh;}
*{box-sizing:border-box;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,0,0,0.97);border-bottom:1px solid rgba(232,40,30,0.2);height:58px;display:flex;align-items:center;gap:6px;padding:0 12px;}
.nlogo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#e8281e;flex-shrink:0;margin-right:4px;}
.ntabs{display:flex;gap:3px;flex:1;overflow-x:auto;}
.ntabs::-webkit-scrollbar{display:none;}
.ntab{padding:6px 12px;border-radius:100px;border:1px solid transparent;background:transparent;color:#a88080;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.ntab.on{background:var(--ac,#e8281e);color:#fff;}
.nbtn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(232,40,30,0.2);background:rgba(30,8,8,0.9);color:#f5e6e6;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
main{padding:70px 12px 40px;max-width:900px;margin:0 auto;}
.usub{font-size:11px;font-weight:300;letter-spacing:6px;color:var(--ac,#e8281e);text-transform:uppercase;margin-bottom:4px;}
.utitle{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;letter-spacing:2px;}
.ustats{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.spill{background:rgba(30,8,8,0.9);border:1px solid rgba(232,40,30,0.15);border-radius:100px;padding:4px 12px;font-size:12px;color:#a88080;}
.spill b{color:var(--ac,#e8281e);}
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{padding:5px 12px;border-radius:100px;border:1px solid rgba(232,40,30,0.15);background:rgba(30,8,8,0.9);color:#a88080;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.fbtn.on{background:var(--ac,#e8281e);color:#fff;border-color:var(--ac,#e8281e);}
.fbtn.heart.on{background:#e84393;border-color:#e84393;}
.fsel{padding:5px 12px;border-radius:100px;border:1px solid rgba(232,40,30,0.15);background:rgba(30,8,8,0.9);color:#a88080;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;outline:none;}
.slabel{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#a88080;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid rgba(232,40,30,0.12);}
.slabel span{color:var(--ac,#e8281e);font-size:11px;letter-spacing:1px;font-family:'DM Sans',sans-serif;font-weight:400;margin-left:6px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:22px;}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:700px){.grid{grid-template-columns:repeat(4,1fr);}}
.card{background:rgba(30,8,8,0.9);border:1px solid rgba(232,40,30,0.15);border-radius:14px;overflow:hidden;cursor:pointer;position:relative;}
.cph{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:rgba(26,5,5,1);font-size:36px;}
.cimg{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;}
.cover-wrap{position:relative;}
.crank{position:absolute;top:6px;left:6px;background:var(--ac,#e8281e);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:12px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;}
.cheart{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;z-index:2;color:#fff;}
.cheart.on{background:rgba(232,67,147,0.85);}
.cseen-badge{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:14px 6px 4px;font-size:10px;color:rgba(255,255,255,0.9);font-weight:600;}
.cbody{padding:9px;}
.ctitle{font-weight:700;font-size:13px;color:#f5e6e6;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cmeta{font-size:11px;color:#a88080;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cscore{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--ac,#e8281e);}
.cscore small{font-size:10px;color:#a88080;font-family:'DM Sans',sans-serif;}
.cbar-wrap{flex:1;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-left:6px;}
.cbar-fill{height:100%;background:var(--ac,#e8281e);border-radius:2px;}
.crow{display:flex;align-items:center;}
.cplat{margin-top:4px;padding:2px 7px;background:rgba(255,255,255,0.07);border-radius:100px;font-size:10px;color:#a88080;display:inline-block;}
.cprog-txt{font-size:10px;color:#a88080;margin-top:4px;}
.cprog-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:3px;overflow:hidden;}
.cprog-fill{height:100%;background:var(--ac,#e8281e);border-radius:2px;}
.addcard{background:rgba(30,8,8,0.9);border:2px dashed rgba(232,40,30,0.2);border-radius:14px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#a88080;font-size:13px;gap:7px;}
.addicon{width:38px;height:38px;border-radius:50%;border:2px dashed #a88080;display:flex;align-items:center;justify-content:center;font-size:20px;}
.empty-msg{text-align:center;padding:30px;color:#a88080;font-size:13px;grid-column:1/-1;}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;padding:12px;}
.overlay.on{display:flex;}
.modal{background:#1a0505;border:1px solid rgba(232,40,30,0.2);border-radius:18px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;}
.mhead{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(232,40,30,0.12);position:sticky;top:0;background:#1a0505;z-index:5;border-radius:18px 18px 0 0;}
.mtitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--ac,#e8281e);}
.mclose{background:rgba(255,255,255,0.07);border:none;border-radius:50%;width:30px;height:30px;color:#f5e6e6;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mbody{padding:14px 16px;}
.mfoot{padding:12px 16px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid rgba(232,40,30,0.12);flex-wrap:wrap;}
.search-wrap{margin-bottom:14px;}
.search-row{display:flex;gap:6px;}
.search-inp{flex:1;padding:10px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(232,40,30,0.2);border-radius:10px;color:#f5e6e6;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.search-go{background:var(--ac,#e8281e);border:none;border-radius:10px;padding:10px 14px;color:#fff;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sresults{margin-top:8px;}
.sri{display:flex;align-items:center;gap:9px;padding:8px;border:1px solid rgba(232,40,30,0.12);border-radius:9px;cursor:pointer;margin-bottom:5px;background:rgba(255,255,255,0.02);}
.sri img{width:36px;height:52px;border-radius:4px;object-fit:cover;flex-shrink:0;}
.sri-ph{width:36px;height:52px;border-radius:4px;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sri-t{font-weight:700;font-size:13px;color:#f5e6e6;}
.sri-m{font-size:11px;color:#a88080;margin-top:2px;}
.sload{text-align:center;padding:14px;color:#a88080;font-size:12px;}
.sor{text-align:center;color:#a88080;font-size:11px;margin:10px 0 14px;}
.frow{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:130px;}
.fg.full{flex-basis:100%;min-width:100%;}
.fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#a88080;}
.fg input,.fg select,.fg textarea{background:rgba(255,255,255,0.07);border:1px solid rgba(232,40,30,0.15);border-radius:8px;padding:8px 10px;color:#f5e6e6;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;}
.seen-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(232,40,30,0.12);border-radius:9px;padding:10px;margin-bottom:12px;flex-wrap:wrap;}
.tog{position:relative;width:42px;height:23px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.togslide{position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,0.15);cursor:pointer;}
.togslide::before{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform 0.2s;}
.tog input:checked+.togslide{background:var(--ac,#e8281e);}
.tog input:checked+.togslide::before{transform:translateX(19px);}
.seen-lbl{font-size:13px;color:#f5e6e6;flex:1;}
.seen-lbl small{display:block;font-size:11px;color:#a88080;}
.seen-date{padding:7px 9px;font-size:13px;border-radius:8px;border:1px solid rgba(232,40,30,0.15);background:rgba(255,255,255,0.07);color:#f5e6e6;font-family:'DM Sans',sans-serif;}
.rbox{background:rgba(255,255,255,0.02);border:1px solid rgba(232,40,30,0.12);border-radius:13px;padding:14px;margin-bottom:13px;}
.rbox h4{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--ac,#e8281e);margin-bottom:10px;}
.crit-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.crit-lbl{font-size:12px;color:#f5e6e6;width:155px;flex-shrink:0;}
.crit-lbl small{color:#a88080;font-size:10px;}
.crit-inp{display:flex;align-items:center;gap:6px;flex:1;}
.crit-range{flex:1;height:5px;-webkit-appearance:none;background:rgba(255,255,255,0.12);border-radius:3px;border:none;padding:0;cursor:pointer;accent-color:var(--ac,#e8281e);}
.crit-val{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--ac,#e8281e);min-width:36px;text-align:right;}
.tot-box{display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,var(--ac,#e8281e),#ff6b5e);border-radius:10px;padding:11px 14px;margin-top:10px;}
.tot-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:#fff;line-height:1;}
.tot-info{color:rgba(255,255,255,0.8);font-size:12px;}
.tot-info strong{display:block;color:#fff;}
.sea-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.sea-lbl{font-size:12px;color:#f5e6e6;width:70px;flex-shrink:0;}
.sea-inp{display:flex;align-items:center;gap:4px;}
.sea-inp input{width:48px;text-align:center;padding:6px;font-size:13px;border-radius:7px;border:1px solid rgba(232,40,30,0.15);background:rgba(255,255,255,0.07);color:#f5e6e6;font-family:'DM Sans',sans-serif;}
.sea-sep{font-size:11px;color:#a88080;}
.sea-rm{background:none;border:none;color:#e74c3c;cursor:pointer;margin-left:4px;font-size:14px;}
.det-top{display:flex;gap:14px;margin-bottom:14px;}
.det-cover{width:100px;flex-shrink:0;border-radius:10px;overflow:hidden;}
.det-cover img{width:100%;display:block;object-fit:cover;}
.det-cover-ph{width:100px;height:148px;display:flex;align-items:center;justify-content:center;background:rgba(26,5,5,1);font-size:36px;border-radius:10px;}
.det-info{flex:1;min-width:0;}
.det-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:#f5e6e6;line-height:1;margin-bottom:6px;}
.det-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.dtag{padding:3px 9px;background:rgba(255,255,255,0.07);border-radius:100px;font-size:11px;color:#a88080;}
.dtag.seen{background:rgba(39,174,96,0.2);color:#6fcf97;}
.det-score{font-family:'Bebas Neue',sans-serif;font-size:46px;color:var(--ac,#e8281e);line-height:1;}
.det-score small{font-size:16px;color:#a88080;font-family:'DM Sans',sans-serif;}
.hbtn{padding:7px 14px;border-radius:100px;border:1px solid rgba(232,67,147,0.4);background:rgba(232,67,147,0.1);color:#e84393;font-size:12px;cursor:pointer;margin-top:7px;font-family:'DM Sans',sans-serif;}
.hbtn.on{background:#e84393;color:#fff;}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.blbl{font-size:12px;color:#f5e6e6;width:155px;flex-shrink:0;}
.btrack{flex:1;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.bfill{height:100%;background:var(--ac,#e8281e);border-radius:3px;}
.bval{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--ac,#e8281e);min-width:38px;text-align:right;}
.sea-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px;margin-top:8px;}
.scard{background:rgba(255,255,255,0.04);border:1px solid rgba(232,40,30,0.12);border-radius:8px;padding:8px;text-align:center;}
.scard-n{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--ac,#e8281e);}
.scard-p{font-size:10px;color:#a88080;margin-top:2px;}
.scard-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:4px;overflow:hidden;}
.scard-fill{height:100%;background:var(--ac,#e8281e);border-radius:2px;}
.radar-wrap{display:flex;justify-content:center;margin:10px 0;}
.bk-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bkcard{background:rgba(255,255,255,0.03);border:1px solid rgba(232,40,30,0.12);border-radius:13px;padding:16px;text-align:center;cursor:pointer;}
.bkcard-i{font-size:32px;margin-bottom:8px;}
.bkcard-t{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--ac,#e8281e);margin-bottom:3px;}
.bkcard-d{font-size:11px;color:#a88080;line-height:1.5;}
.bk-info{background:rgba(255,255,255,0.02);border:1px solid rgba(232,40,30,0.12);border-radius:8px;padding:12px;font-size:12px;color:#a88080;line-height:1.8;}
.bk-info b{color:#f5e6e6;}
.btn{background:var(--ac,#e8281e);color:#fff;border:none;border-radius:100px;padding:9px 20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btns{background:rgba(255,255,255,0.07);color:#f5e6e6;border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btnd{background:rgba(231,76,60,0.15);color:#e74c3c;border:1px solid rgba(231,76,60,0.3);border-radius:100px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.addsea-btn{background:rgba(255,255,255,0.07);color:#f5e6e6;border:1px solid rgba(255,255,255,0.1);border-radius:100px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;}
.toast{position:fixed;bottom:20px;right:13px;background:var(--ac,#e8281e);color:#fff;padding:9px 16px;border-radius:100px;font-size:13px;font-weight:500;z-index:999;display:none;}
.toast.on{display:block;}
@media(max-width:400px){.crit-lbl{width:125px;font-size:11px;}.blbl{width:120px;}}
</style>
</head>
<body>
<nav>
  <div class="nlogo">UNIVERSE</div>
  <div class="ntabs">
    <button class="ntab on" onclick="sw('films')">&#127916; Films</button>
    <button class="ntab" onclick="sw('series')">&#128250; Series</button>
    <button class="ntab" onclick="sw('livres')">&#128218; Livres</button>
    <button class="ntab" onclick="sw('jeux')">&#127918; Jeux</button>
  </div>
  <button class="nbtn" onclick="openAdd(null)">+</button>
  <button class="nbtn" onclick="openBk()">&#128190;</button>
</nav>
<main>
  <div class="usub" id="usub">Cinema</div>
  <div class="utitle" id="utxt">FILMS</div>
  <div class="ustats" id="ustats"></div>
  <br>
  <div class="fbar" id="fbar"></div>
  <div id="rankings"></div>
</main>

<div class="overlay" id="mod-add">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle" id="add-title">AJOUTER</div>
      <button class="mclose" onclick="cm('mod-add')">&#x2715;</button>
    </div>
    <div class="mbody">
      <div class="search-wrap">
        <div class="search-row">
          <input class="search-inp" id="search-inp" type="text" placeholder="Rechercher..." onkeydown="searchKey(event)">
          <button class="search-go" onclick="doSearch()">Chercher</button>
        </div>
        <div class="sresults" id="sresults"></div>
        <div class="sor">ou remplir manuellement</div>
      </div>
      <div id="form-fields"></div>
      <div class="seen-row">
        <label class="tog"><input type="checkbox" id="f-seen" onchange="toggleSeen()"><span class="togslide"></span></label>
        <div class="seen-lbl"><span>Termine</span><small>Cochez si termine</small></div>
        <input type="date" id="f-sdate" class="seen-date" style="display:none">
      </div>
      <div class="rbox">
        <h4>NOTATION</h4>
        <div id="crit-fields"></div>
        <div class="tot-box">
          <div class="tot-num" id="live-score">0.0</div>
          <div class="tot-info"><strong>Note totale</strong>sur 20</div>
        </div>
      </div>
      <div id="extra-fields"></div>
    </div>
    <div class="mfoot">
      <button class="btnd" id="del-btn" style="display:none" onclick="delItem()">Supprimer</button>
      <button class="btns" onclick="cm('mod-add')">Annuler</button>
      <button class="btn" onclick="saveItem()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="overlay" id="mod-det">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle" id="det-title-txt">DETAILS</div>
      <button class="mclose" onclick="cm('mod-det')">&#x2715;</button>
    </div>
    <div class="mbody" id="det-body"></div>
    <div class="mfoot">
      <button class="btns" onclick="editCurrent()">Modifier</button>
      <button class="btn" onclick="cm('mod-det')">Fermer</button>
    </div>
  </div>
</div>

<div class="overlay" id="mod-bk">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle">SAUVEGARDE</div>
      <button class="mclose" onclick="cm('mod-bk')">&#x2715;</button>
    </div>
    <div class="mbody">
      <div class="bk-opts">
        <div class="bkcard" onclick="exportData()"><div class="bkcard-i">&#128229;</div><div class="bkcard-t">EXPORTER</div><div class="bkcard-d">Telecharger tes donnees</div></div>
        <div class="bkcard" onclick="document.getElementById('imp-file').click()"><div class="bkcard-i">&#128228;</div><div class="bkcard-t">IMPORTER</div><div class="bkcard-d">Restaurer depuis un fichier</div></div>
      </div>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
      <div class="bk-info" id="bk-info"></div>
    </div>
    <div class="mfoot"><button class="btn" onclick="cm('mod-bk')">Fermer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
var TK='6a33084f9f4ea1d89a33bac3362c3824';
var RK='8545873ab2414a5a86acd6c4526c43e2';
var TI='https://image.tmdb.org/t/p/w500';
var DBK='universe_v5';
var CY=String(new Date().getFullYear());

var CFG={};
CFG.films={e:'&#127916;',lbl:'Films',sub:'Cinema',ml:'Realisateur',sl:'Vu le',nsl:'Non vu',cr:[{k:'histoire',l:'Histoire',m:8},{k:'acting',l:'Acting',m:4},{k:'musique',l:'Musique',m:3},{k:'visuel',l:'Visuel',m:3},{k:'rythme',l:'Rythme',m:2}]};
CFG.series={e:'&#128250;',lbl:'Series',sub:'Television',ml:'Showrunner',sl:'Terminee le',nsl:'Non vue',cr:[{k:'histoire',l:'Histoire',m:8},{k:'acting',l:'Acting',m:4},{k:'musique',l:'Musique',m:3},{k:'visuel',l:'Visuel',m:3},{k:'rythme',l:'Rythme',m:2}]};
CFG.livres={e:'&#128218;',lbl:'Livres',sub:'Bibliotheque',ml:'Auteur',sl:'Lu le',nsl:'Non lu',cr:[{k:'histoire',l:'Histoire',m:8},{k:'personnages',l:'Personnages',m:5},{k:'ecriture',l:'Ecriture',m:4},{k:'univers',l:'Univers',m:3}]};
CFG.jeux={e:'&#127918;',lbl:'Jeux video',sub:'Gaming',ml:'Studio',sl:'Termine le',nsl:'Non termine',cr:[{k:'histoire',l:'Histoire',m:6},{k:'visuel',l:'Visuel',m:5},{k:'musique',l:'Musique',m:4},{k:'gameplay',l:'Gameplay',m:5}]};

var PLATS=['PS5','PS4','Xbox Series','Xbox One','Nintendo Switch','PC','Mobile','Autre'];
var GEN={};
GEN.films=['Action','Comedie','Drame','Fantaisie','Horreur','Romance','SF','Thriller','Animation','Documentaire','Autre'];
GEN.series=['Action','Comedie','Drame','Fantaisie','Horreur','Romance','SF','Thriller','Animation','Documentaire','Autre'];
GEN.livres=['Roman','Fantasy','SF','Policier','Romance','Thriller','Biographie','BD/Manga','Essai','Autre'];
GEN.jeux=['Action','RPG','FPS','Aventure','Simulation','Sport','Strategie','Puzzle','Plateforme','Autre'];

var ACMAP={films:'#e8281e',series:'#6c5ce7',livres:'#27ae60',jeux:'#f39c12'};

function loadDb(){try{var r=localStorage.getItem(DBK);if(r){var p=JSON.parse(r);if(p&&p.films)return p;}}catch(e){}return{films:[],series:[],livres:[],jeux:[]};}
function saveDb(){localStorage.setItem(DBK,JSON.stringify(db));}
var db=loadDb();
var cu='films',cf='best',cp='all',editId=null,detId=null,toastT=null,srchT=null;

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function getTotal(item,u){var s=0,cr=CFG[u].cr;for(var i=0;i<cr.length;i++){s+=parseFloat((item.scores&&item.scores[cr[i].k])||0);}return s;}
function getProg(item){if(!item.seasons||!item.seasons.length)return{w:0,t:0,p:0};var w=0,t=0;for(var i=0;i<item.seasons.length;i++){w+=parseInt(item.seasons[i].watched)||0;t+=parseInt(item.seasons[i].total)||0;}return{w:w,t:t,p:t>0?Math.round(w/t*100):0};}
function fmtDate(d){if(!d)return '';try{var dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('on');},2600);}
function om(id){document.getElementById(id).classList.add('on');document.body.style.overflow='hidden';}
function cm(id){document.getElementById(id).classList.remove('on');document.body.style.overflow='';}

document.getElementById('mod-add').onclick=function(e){if(e.target===this)cm('mod-add');};
document.getElementById('mod-det').onclick=function(e){if(e.target===this)cm('mod-det');};
document.getElementById('mod-bk').onclick=function(e){if(e.target===this)cm('mod-bk');};
document.onkeydown=function(e){if(e.key==='Escape'){cm('mod-add');cm('mod-det');cm('mod-bk');}};

function setAC(u){
  var ac=ACMAP[u]||'#e8281e';
  document.documentElement.style.setProperty('--ac',ac);
}

function sw(u){
  cu=u;cf='best';cp='all';
  setAC(u);
  var tabs=document.querySelectorAll('.ntab');
  var us=['films','series','livres','jeux'];
  for(var i=0;i<tabs.length;i++){if(us[i]===u)tabs[i].classList.add('on');else tabs[i].classList.remove('on');}
  var mc=document.querySelector('meta[name="theme-color"]');
  if(mc)mc.setAttribute('content',ACMAP[u]);
  renderHead();renderFilters();renderCards();
}

function renderHead(){
  var cfg=CFG[cu],items=db[cu],n=items.length,sum=0,seen=0,fav=0;
  for(var i=0;i<items.length;i++){sum+=getTotal(items[i],cu);if(items[i].seen)seen++;if(items[i].heart)fav++;}
  document.getElementById('usub').textContent=cfg.sub;
  document.getElementById('utxt').textContent=cfg.lbl.toUpperCase();
  document.getElementById('ustats').innerHTML=
    '<div class="spill"><b>'+n+'</b> titre'+(n>1?'s':'')+'</div>'+
    '<div class="spill"><b>'+(n>0?(sum/n).toFixed(1):'0.0')+'</b>/20</div>'+
    '<div class="spill">OK <b>'+seen+'</b></div>'+
    '<div class="spill">Fav <b>'+fav+'</b></div>';
}

function renderFilters(){
  var h=
    '<button class="fbtn'+(cf==='best'?' on':'')+'" onclick="sf(\'best\')">Meilleure note</button>'+
    '<button class="fbtn heart'+(cf==='heart'?' on':'')+'" onclick="sf(\'heart\')">Favoris</button>'+
    '<button class="fbtn'+(cf==='seen'?' on':'')+'" onclick="sf(\'seen\')">Termines</button>'+
    '<button class="fbtn'+(cf==='unseen'?' on':'')+'" onclick="sf(\'unseen\')">A voir</button>'+
    '<button class="fbtn'+(cf==='recent'?' on':'')+'" onclick="sf(\'recent\')">Recents</button>';
  if(cu==='series')h+='<button class="fbtn'+(cf==='prog'?' on':'')+'" onclick="sf(\'prog\')">En cours</button>';
  if(cu==='jeux'){
    h+='<select class="fsel" onchange="sp(this.value)"><option value="all">Toutes plateformes</option>';
    for(var i=0;i<PLATS.length;i++)h+='<option value="'+PLATS[i]+'"'+(cp===PLATS[i]?' selected':'')+'>'+PLATS[i]+'</option>';
    h+='</select>';
  }
  document.getElementById('fbar').innerHTML=h;
}
function sf(f){cf=f;renderFilters();renderCards();}
function sp(p){cp=p;renderCards();}

function sortScore(arr){
  var n=arr.length;
  for(var a=0;a<n-1;a++){for(var b=a+1;b<n;b++){if(getTotal(arr[a],cu)<getTotal(arr[b],cu)){var tmp=arr[a];arr[a]=arr[b];arr[b]=tmp;}}}
}
function sortRecent(arr){
  var n=arr.length;
  for(var a=0;a<n-1;a++){for(var b=a+1;b<n;b++){if((arr[a].addedAt||0)<(arr[b].addedAt||0)){var tmp=arr[a];arr[a]=arr[b];arr[b]=tmp;}}}
}

function renderCards(){
  var el=document.getElementById('rankings');
  var cfg=CFG[cu];
  var allItems=db[cu].slice();
  if(cu==='jeux'&&cp!=='all'){var f=[];for(var i=0;i<allItems.length;i++)if(allItems[i].platform===cp)f.push(allItems[i]);allItems=f;}
  var ranked=allItems.slice();sortScore(ranked);
  var disp=allItems.slice();
  if(cf==='heart'){var f=[];for(var i=0;i<disp.length;i++)if(disp[i].heart)f.push(disp[i]);disp=f;}
  else if(cf==='unseen'){var f=[];for(var i=0;i<disp.length;i++)if(!disp[i].seen)f.push(disp[i]);disp=f;}
  else if(cf==='prog'){var f=[];for(var i=0;i<disp.length;i++){var pr=getProg(disp[i]);if(pr.p>0&&pr.p<100)f.push(disp[i]);}disp=f;}
  if(cf==='recent')sortRecent(disp);else sortScore(disp);

  var html='';
  var showSec=(cf==='best'||cf==='seen'||cf==='recent');

  if(showSec){
    var g1=[],g2=[],g3=[];
    for(var i=0;i<allItems.length;i++){
      var it=allItems[i];
      var sy=(it.seen&&it.seenDate)?it.seenDate.substr(0,4):'';
      var sty=(it.seen&&sy===CY);
      if(sty&&it.releaseYear===CY)g1.push(it);
      else if(sty&&it.releaseYear!==CY)g2.push(it);
      else g3.push(it);
    }
    if(cf==='recent'){sortRecent(g1);sortRecent(g2);sortRecent(g3);}
    else{sortScore(g1);sortScore(g2);sortScore(g3);}
    var slmap={films:'vus',series:'terminees',livres:'lus',jeux:'termines'};
    var sl=slmap[cu];
    var secs=[
      {title:'NOUVEAUTES '+CY,sub:'Parus et '+sl+' en '+CY,items:g1},
      {title:'DECOUVERTES '+CY,sub:sl+' en '+CY+' avant '+CY,items:g2},
      {title:'COLLECTION',sub:'Non termines ou vus avant '+CY,items:g3}
    ];
    for(var s=0;s<secs.length;s++){
      html+='<div class="slabel">'+secs[s].title+' <span>'+secs[s].sub+'</span></div><div class="grid">';
      if(!secs[s].items.length)html+='<div class="empty-msg">Aucun contenu ici</div>';
      else for(var i=0;i<secs[s].items.length;i++)html+=buildCard(secs[s].items[i],ranked,cfg);
      html+='</div>';
    }
    html+='<div class="grid"><div class="addcard" onclick="openAdd(null)"><div class="addicon">+</div><div>Ajouter</div></div></div>';
  } else {
    var lblmap={heart:'FAVORIS',unseen:'A VOIR',prog:'EN COURS'};
    html='<div class="slabel">'+(lblmap[cf]||'COLLECTION')+'</div><div class="grid">';
    if(!disp.length)html+='<div class="empty-msg">Aucun contenu.</div>';
    else for(var i=0;i<disp.length;i++)html+=buildCard(disp[i],ranked,cfg);
    html+='<div class="addcard" onclick="openAdd(null)"><div class="addicon">+</div><div>Ajouter</div></div></div>';
  }
  el.innerHTML=html;
}

function buildCard(item,ranked,cfg){
  var score=getTotal(item,cu),pct=Math.round(score/20*100),rank=1;
  for(var i=0;i<ranked.length;i++)if(ranked[i].id===item.id){rank=i+1;break;}
  var sb=item.seen?'<div class="cseen-badge">OK '+(item.seenDate?fmtDate(item.seenDate):'')+'</div>':'';
  var cov=item.cover?'<div class="cover-wrap"><img class="cimg" src="'+esc(item.cover)+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'+sb+'</div>':'<div class="cph">'+cfg.e+'</div>';
  var ex='';
  if(cu==='jeux'&&item.platform)ex='<div class="cplat">'+esc(item.platform)+'</div>';
  if(cu==='series'&&item.seasons&&item.seasons.length){var pr=getProg(item);ex='<div class="cprog-txt">S'+item.seasons.length+' - '+pr.w+'/'+pr.t+' ('+pr.p+'%)</div><div class="cprog-bar"><div class="cprog-fill" style="width:'+pr.p+'%"></div></div>';}
  var yr=item.releaseYear?' - '+item.releaseYear:'';
  return '<div class="card" onclick="openDet(\''+item.id+'\')">'+'<div class="crank">#'+rank+'</div>'+'<button class="cheart'+(item.heart?' on':'')+'" onclick="event.stopPropagation();toggleHeart(\''+item.id+'\')">'+(item.heart?'&#9829;':'&#9825;')+'</button>'+cov+'<div class="cbody"><div class="ctitle">'+esc(item.title)+'</div><div class="cmeta">'+esc(item.meta||'')+yr+'</div><div class="crow"><div class="cscore">'+score.toFixed(1)+'<small>/20</small></div><div class="cbar-wrap"><div class="cbar-fill" style="width:'+pct+'%"></div></div></div>'+ex+'</div></div>';
}

function toggleHeart(id){
  for(var i=0;i<db[cu].length;i++){if(db[cu][i].id===id){db[cu][i].heart=!db[cu][i].heart;saveDb();toast(db[cu][i].heart?'Ajoute aux favoris !':'Retire des favoris');renderHead();renderCards();return;}}
}

function searchKey(e){if(e.keyCode===13){doSearch();return;}clearTimeout(srchT);var v=document.getElementById('search-inp').value;if(v&&v.length>=2)srchT=setTimeout(doSearch,700);}

function doSearch(){
  var q=document.getElementById('search-inp').value;if(!q||!q.trim())return;q=q.trim();
  var el=document.getElementById('sresults');el.innerHTML='<div class="sload">Recherche...</div>';
  var url='';
  if(cu==='films')url='https://api.themoviedb.org/3/search/movie?api_key='+TK+'&query='+encodeURIComponent(q)+'&language=fr-FR';
  else if(cu==='series')url='https://api.themoviedb.org/3/search/tv?api_key='+TK+'&query='+encodeURIComponent(q)+'&language=fr-FR';
  else if(cu==='livres')url='https://www.googleapis.com/books/v1/volumes?q='+encodeURIComponent(q)+'&maxResults=10&orderBy=relevance&printType=books';
  else if(cu==='jeux')url='https://api.rawg.io/api/games?key='+RK+'&search='+encodeURIComponent(q)+'&page_size=8';
  var t=(cu==='films'||cu==='series')?'tmdb':(cu==='livres'?'books':'games');
  ajaxGet(url,function(data){showSR(data,t);},function(){el.innerHTML='<div class="sload">Erreur reseau.</div>';});
}

function ajaxGet(url,ok,err){
  var xhr=new XMLHttpRequest();xhr.open('GET',url);
  xhr.onreadystatechange=function(){if(xhr.readyState===4){if(xhr.status===200){try{ok(JSON.parse(xhr.responseText));}catch(e){err();}}else err();}};
  xhr.onerror=err;xhr.send();
}

function showSR(data,type){
  var el=document.getElementById('sresults');
  var results=[];
  if(type==='tmdb')results=data.results||[];
  else if(type==='books')results=data.items||[];
  else if(type==='games')results=data.results||[];
  if(!results.length){el.innerHTML='<div class="sload">Aucun resultat.</div>';return;}
  var max=results.length>6?6:results.length,h='';
  for(var i=0;i<max;i++){
    var r=results[i],title='',year='',cover='',rid='',m2='';
    if(type==='tmdb'){title=r.title||r.name||'';var rd=r.release_date||r.first_air_date||'';year=rd?rd.substr(0,4):'';cover=r.poster_path?TI+r.poster_path:'';rid=r.id;m2=r.vote_average?'&#11088; '+parseFloat(r.vote_average).toFixed(1):'';}
    else if(type==='books'){var info=r.volumeInfo||{};title=info.title||'';var au=info.authors?info.authors[0]:'';year=info.publishedDate?info.publishedDate.substr(0,4):'';cover=info.imageLinks?(info.imageLinks.thumbnail||''):'';if(cover)cover=cover.replace('http://','https://');rid=r.id;m2=au;}
    else if(type==='games'){title=r.name||'';year=r.released?r.released.substr(0,4):'';cover=r.background_image||'';rid=r.id;m2=r.rating?'&#11088; '+parseFloat(r.rating).toFixed(1):'';}
    var covEl=cover?'<img src="'+esc(cover)+'" alt="" onerror="this.style.display=\'none\'">':'<div class="sri-ph">'+CFG[cu].e+'</div>';
    h+='<div class="sri" onclick="selResult(\''+rid+'\',\''+type+'\')">'+covEl+'<div><div class="sri-t">'+esc(title)+'</div><div class="sri-m">'+esc(year)+(m2?' &nbsp;'+m2:'')+'</div></div></div>';
  }
  el.innerHTML=h;
}

function selResult(rid,type){
  var el=document.getElementById('sresults');el.innerHTML='<div class="sload">Chargement...</div>';
  var url='';
  if(type==='tmdb'){var mt=cu==='films'?'movie':'tv';url='https://api.themoviedb.org/3/'+mt+'/'+rid+'?api_key='+TK+'&language=fr-FR&append_to_response=credits';}
  else if(type==='books')url='https://www.googleapis.com/books/v1/volumes/'+rid;
  else if(type==='games')url='https://api.rawg.io/api/games/'+rid+'?key='+RK;
  ajaxGet(url,function(data){
    if(type==='tmdb')fillTMDB(data);
    else if(type==='books')fillBooks(data);
    else fillGames(data);
    el.innerHTML='';document.getElementById('search-inp').value='';toast('Infos remplies !');
  },function(){el.innerHTML='<div class="sload">Erreur.</div>';});
}

function fld(id,val){var e=document.getElementById(id);if(e)e.value=val||'';}
function fillGenre(genre){if(!genre)return;var gs=document.getElementById('f-genre');if(!gs)return;var opts=gs.options;for(var i=0;i<opts.length;i++){var ov=(opts[i].value||'').toLowerCase();var gv=genre.toLowerCase();if(ov&&(gv===ov||gv.indexOf(ov)>=0)){gs.selectedIndex=i;return;}}}

function fillTMDB(d){
  fld('f-title',d.title||d.name);fld('f-year',(d.release_date||d.first_air_date||'').substr(0,4));
  fld('f-cover',d.poster_path?TI+d.poster_path:'');
  var meta='';
  if(cu==='films'&&d.credits&&d.credits.crew){for(var i=0;i<d.credits.crew.length;i++)if(d.credits.crew[i].job==='Director'){meta=d.credits.crew[i].name;break;}}
  else if(cu==='series'&&d.created_by&&d.created_by.length)meta=d.created_by[0].name;
  fld('f-meta',meta);if(d.genres&&d.genres.length)fillGenre(d.genres[0].name);
}
function fillBooks(d){var info=d.volumeInfo||{};fld('f-title',info.title);fld('f-meta',info.authors?info.authors[0]:'');fld('f-year',info.publishedDate?info.publishedDate.substr(0,4):'');var cov=info.imageLinks?(info.imageLinks.thumbnail||''):'';fld('f-cover',cov.replace('http://','https://'));if(info.categories&&info.categories.length)fillGenre(info.categories[0].split('/')[0].trim());}
function fillGames(d){fld('f-title',d.name);fld('f-year',d.released?d.released.substr(0,4):'');fld('f-cover',d.background_image||'');var stu=d.developers&&d.developers.length?d.developers[0].name:'';fld('f-meta',stu);if(d.genres&&d.genres.length)fillGenre(d.genres[0].name);}

function openAdd(id){
  editId=id||null;var cfg=CFG[cu],item=null;
  if(editId)for(var i=0;i<db[cu].length;i++)if(db[cu][i].id===editId){item=db[cu][i];break;}
  document.getElementById('add-title').textContent=editId?'MODIFIER':'AJOUTER';
  document.getElementById('del-btn').style.display=editId?'inline-block':'none';
  document.getElementById('search-inp').value='';document.getElementById('sresults').innerHTML='';
  var fh='<div class="frow"><div class="fg full"><label>Titre *</label><input type="text" id="f-title" value="'+esc(item?item.title:'')+'" placeholder="Titre..."></div></div>'+
    '<div class="frow"><div class="fg"><label>'+cfg.ml+'</label><input type="text" id="f-meta" value="'+esc(item?item.meta:'')+'" placeholder="'+cfg.ml+'..."></div>'+
    '<div class="fg"><label>Annee</label><input type="number" id="f-year" value="'+esc(item?item.releaseYear:'')+'" placeholder="2024" min="1888" max="2099"></div></div>'+
    '<div class="frow"><div class="fg"><label>Genre</label><select id="f-genre"><option value="">Choisir...</option>';
  var gs=GEN[cu];for(var i=0;i<gs.length;i++)fh+='<option value="'+gs[i]+'"'+(item&&item.genre===gs[i]?' selected':'')+'>'+gs[i]+'</option>';
  fh+='</select></div>';
  if(cu==='jeux'){fh+='<div class="fg"><label>Plateforme</label><select id="f-plat"><option value="">Choisir...</option>';for(var i=0;i<PLATS.length;i++)fh+='<option value="'+PLATS[i]+'"'+(item&&item.platform===PLATS[i]?' selected':'')+'>'+PLATS[i]+'</option>';fh+='</select></div>';}
  fh+='</div><div class="frow"><div class="fg full"><label>Image URL</label><input type="url" id="f-cover" value="'+esc(item?item.cover:'')+'" placeholder="https://..."></div></div>';
  document.getElementById('form-fields').innerHTML=fh;
  var sc=document.getElementById('f-seen');sc.checked=item?!!item.seen:false;
  var sd=document.getElementById('f-sdate');sd.value=item&&item.seenDate?item.seenDate:'';sd.style.display=item&&item.seen?'inline-block':'none';
  var ch='',cr=cfg.cr;
  for(var i=0;i<cr.length;i++){var v=item&&item.scores?(item.scores[cr[i].k]||0):0;ch+='<div class="crit-row"><div class="crit-lbl">'+cr[i].l+'<small> /'+cr[i].m+'</small></div><div class="crit-inp"><input type="range" class="crit-range" id="cr-'+cr[i].k+'" min="0" max="'+cr[i].m+'" step="0.5" value="'+v+'" oninput="updateScore()"><div class="crit-val" id="cv-'+cr[i].k+'">'+parseFloat(v).toFixed(1)+'</div></div></div>';}
  document.getElementById('crit-fields').innerHTML=ch;updateScore();
  var ex='';
  if(cu==='series'){var seas=item&&item.seasons&&item.seasons.length?item.seasons:[{watched:0,total:10}];ex='<div class="rbox"><h4>SUIVI EPISODES</h4><div id="seas-list">'+buildSeasHtml(seas)+'</div><button type="button" class="addsea-btn" onclick="addSeason()">+ Ajouter saison</button></div>';}
  document.getElementById('extra-fields').innerHTML=ex;
  om('mod-add');
}

function toggleSeen(){var c=document.getElementById('f-seen').checked;var sd=document.getElementById('f-sdate');sd.style.display=c?'inline-block':'none';if(c&&!sd.value)sd.value=new Date().toISOString().split('T')[0];}
function updateScore(){var cr=CFG[cu].cr,s=0;for(var i=0;i<cr.length;i++){var el=document.getElementById('cr-'+cr[i].k),cv=document.getElementById('cv-'+cr[i].k);if(el){var v=parseFloat(el.value)||0;s+=v;if(cv)cv.textContent=v.toFixed(1);}}document.getElementById('live-score').textContent=s.toFixed(1);}
function buildSeasHtml(seas){var h='';for(var i=0;i<seas.length;i++){var rm=i>0?'<button type="button" class="sea-rm" onclick="rmSea('+i+')">x</button>':'';h+='<div class="sea-row" id="sea-'+i+'"><div class="sea-lbl">S'+(i+1)+'</div><div class="sea-inp"><input type="number" id="sw-'+i+'" min="0" value="'+(seas[i].watched||0)+'"><span class="sea-sep"> / </span><input type="number" id="st-'+i+'" min="1" value="'+(seas[i].total||10)+'"><span class="sea-sep"> ep</span>'+rm+'</div></div>';}return h;}
function addSeason(){var lst=document.getElementById('seas-list'),idx=lst.querySelectorAll('.sea-row').length,div=document.createElement('div');div.innerHTML='<div class="sea-row" id="sea-'+idx+'"><div class="sea-lbl">S'+(idx+1)+'</div><div class="sea-inp"><input type="number" id="sw-'+idx+'" min="0" value="0"><span class="sea-sep"> / </span><input type="number" id="st-'+idx+'" min="1" value="10"><span class="sea-sep"> ep</span><button type="button" class="sea-rm" onclick="rmSea('+idx+')">x</button></div></div>';lst.appendChild(div.firstElementChild);}
function rmSea(idx){var r=document.getElementById('sea-'+idx);if(r){r.remove();var lbls=document.querySelectorAll('#seas-list .sea-lbl');for(var i=0;i<lbls.length;i++)lbls[i].textContent='S'+(i+1);}}

function saveItem(){
  var ti=document.getElementById('f-title');if(!ti||!ti.value.trim()){toast('Titre obligatoire');return;}
  var cfg=CFG[cu],scores={};
  for(var i=0;i<cfg.cr.length;i++){var el=document.getElementById('cr-'+cfg.cr[i].k);scores[cfg.cr[i].k]=el?parseFloat(el.value)||0:0;}
  var seen=document.getElementById('f-seen').checked;
  var sd=seen?(document.getElementById('f-sdate').value||''):'';
  var existing=null;if(editId)for(var i=0;i<db[cu].length;i++)if(db[cu][i].id===editId){existing=db[cu][i];break;}
  var item={id:editId||uid(),title:ti.value.trim(),meta:(document.getElementById('f-meta')||{value:''}).value.trim(),releaseYear:(document.getElementById('f-year')||{value:''}).value,genre:(document.getElementById('f-genre')||{value:''}).value,cover:(document.getElementById('f-cover')||{value:''}).value.trim(),scores:scores,seen:seen,seenDate:sd,heart:existing?existing.heart:false,addedAt:existing?existing.addedAt:Date.now()};
  if(cu==='jeux'){var fp=document.getElementById('f-plat');item.platform=fp?fp.value:'';}
  if(cu==='series'){var seas=[],lst=document.getElementById('seas-list');if(lst){var rows=lst.querySelectorAll('.sea-row');for(var i=0;i<rows.length;i++){var ri=rows[i].id.replace('sea-',''),sw2=document.getElementById('sw-'+ri),st2=document.getElementById('st-'+ri);seas.push({watched:sw2?parseInt(sw2.value)||0:0,total:st2?parseInt(st2.value)||10:10});}}item.seasons=seas;}
  if(editId){for(var i=0;i<db[cu].length;i++)if(db[cu][i].id===editId){db[cu][i]=item;break;}}else db[cu].push(item);
  saveDb();cm('mod-add');renderHead();renderCards();toast(editId?'Modifie !':'Ajoute !');editId=null;
}

function delItem(){if(!editId)return;if(!confirm('Supprimer ?'))return;var nl=[];for(var i=0;i<db[cu].length;i++)if(db[cu][i].id!==editId)nl.push(db[cu][i]);db[cu]=nl;saveDb();cm('mod-add');renderHead();renderCards();toast('Supprime.');editId=null;}

function openDet(id){
  detId=id;var item=null;for(var i=0;i<db[cu].length;i++)if(db[cu][i].id===id){item=db[cu][i];break;}if(!item)return;
  var cfg=CFG[cu],score=getTotal(item,cu);
  document.getElementById('det-title-txt').textContent=item.title.toUpperCase();
  var cov=item.cover?'<div class="det-cover"><img src="'+esc(item.cover)+'" alt=""></div>':'<div class="det-cover-ph">'+cfg.e+'</div>';
  var tags='';if(item.meta)tags+='<span class="dtag">'+esc(item.meta)+'</span>';if(item.releaseYear)tags+='<span class="dtag">'+esc(item.releaseYear)+'</span>';if(item.genre)tags+='<span class="dtag">'+esc(item.genre)+'</span>';if(cu==='jeux'&&item.platform)tags+='<span class="dtag">'+esc(item.platform)+'</span>';if(item.seen)tags+='<span class="dtag seen">OK'+(item.seenDate?' - '+fmtDate(item.seenDate):'')+'</span>';else tags+='<span class="dtag">'+cfg.nsl+'</span>';
  var bars='',cr=cfg.cr;for(var i=0;i<cr.length;i++){var v=item.scores?(item.scores[cr[i].k]||0):0,p=Math.round(v/cr[i].m*100);bars+='<div class="brow"><div class="blbl">'+cr[i].l+'</div><div class="btrack"><div class="bfill" style="width:'+p+'%"></div></div><div class="bval">'+parseFloat(v).toFixed(1)+'/'+cr[i].m+'</div></div>';}
  var seas2='';if(cu==='series'&&item.seasons&&item.seasons.length){var pr=getProg(item);seas2='<div style="margin-top:14px"><div class="slabel">PROGRESSION <span>'+pr.w+'/'+pr.t+' ep ('+pr.p+'%)</span></div><div class="sea-grid">';for(var i=0;i<item.seasons.length;i++){var ss=item.seasons[i],sp=ss.total>0?Math.round((ss.watched||0)/ss.total*100):0;seas2+='<div class="scard"><div class="scard-n">S'+(i+1)+'</div><div class="scard-p">'+(ss.watched||0)+'/'+ss.total+'</div><div class="scard-bar"><div class="scard-fill" style="width:'+sp+'%"></div></div></div>';}seas2+='</div></div>';}
  var cid='radar-'+id;
  document.getElementById('det-body').innerHTML='<div class="det-top">'+cov+'<div class="det-info"><div class="det-title">'+esc(item.title)+'</div><div class="det-tags">'+tags+'</div><div class="det-score">'+score.toFixed(1)+'<small>/20</small></div><button class="hbtn'+(item.heart?' on':'')+'" onclick="toggleHeartDet(\''+id+'\')">&#9829; '+(item.heart?'Favori':'Ajouter favori')+'</button></div></div><div class="slabel">NOTES DETAILLEES</div>'+bars+'<div class="radar-wrap"><canvas id="'+cid+'" width="230" height="230"></canvas></div>'+seas2;
  om('mod-det');setTimeout(function(){drawRadar(cid,item,cfg);},80);
}

function toggleHeartDet(id){for(var i=0;i<db[cu].length;i++)if(db[cu][i].id===id){db[cu][i].heart=!db[cu][i].heart;saveDb();renderHead();renderCards();var btn=document.querySelector('#mod-det .hbtn');if(btn){btn.classList.toggle('on',db[cu][i].heart);btn.innerHTML='&#9829; '+(db[cu][i].heart?'Favori':'Ajouter favori');}toast(db[cu][i].heart?'Favoris !':'Retire.');return;}}
function editCurrent(){cm('mod-det');setTimeout(function(){openAdd(detId);},200);}

function drawRadar(cid,item,cfg){
  var canvas=document.getElementById(cid);if(!canvas)return;
  var ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=Math.min(W,H)/2-36,n=cfg.cr.length,ac=ACMAP[cu]||'#e8281e';
  ctx.clearRect(0,0,W,H);
  var lvls=[0.25,0.5,0.75,1];
  for(var l=0;l<lvls.length;l++){ctx.beginPath();for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2-Math.PI/2,px=cx+Math.cos(a)*r*lvls[l],py=cy+Math.sin(a)*r*lvls[l];if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();}
  for(var i=0;i<n;i++){var a=(i/n)*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();for(var i=0;i<n;i++){var v=item.scores?(item.scores[cfg.cr[i].k]||0):0,rat=v/cfg.cr[i].m,a=(i/n)*Math.PI*2-Math.PI/2,px=cx+Math.cos(a)*r*rat,py=cy+Math.sin(a)*r*rat;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}
  ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fill();ctx.strokeStyle=ac;ctx.lineWidth=2;ctx.stroke();
  for(var i=0;i<n;i++){var v=item.scores?(item.scores[cfg.cr[i].k]||0):0,rat=v/cfg.cr[i].m,a=(i/n)*Math.PI*2-Math.PI/2,px=cx+Math.cos(a)*r*rat,py=cy+Math.sin(a)*r*rat;ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fillStyle=ac;ctx.fill();var lx=cx+Math.cos(a)*(r+18),ly=cy+Math.sin(a)*(r+18);ctx.font='10px sans-serif';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(cfg.cr[i].l.split(' ')[0],lx,ly);}
}

function openBk(){var nf=db.films.length,ns=db.series.length,nl=db.livres.length,nj=db.jeux.length;document.getElementById('bk-info').innerHTML='<b>Donnees :</b><br>&#127916; '+nf+' film'+(nf>1?'s':'')+' | &#128250; '+ns+' serie'+(ns>1?'s':'')+' | &#128218; '+nl+' livre'+(nl>1?'s':'')+' | &#127918; '+nj+' jeu'+(nj>1?'x':'')+'<br><br><b>Comment :</b><br>Exporte avant mise a jour. Importe apres pour retrouver tes donnees.';om('mod-bk');}
function exportData(){var bk={version:1,date:new Date().toISOString(),data:db},blob=new Blob([JSON.stringify(bk,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='universe-backup.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('Sauvegarde exportee !');}
function importData(e){var f=e.target.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){try{var bk=JSON.parse(ev.target.result);if(!bk.data||!bk.data.films){toast('Fichier invalide !');return;}if(!confirm('Importer ? Donnees actuelles remplacees.'))return;db=bk.data;if(!db.films)db.films=[];if(!db.series)db.series=[];if(!db.livres)db.livres=[];if(!db.jeux)db.jeux=[];saveDb();renderHead();renderCards();cm('mod-bk');toast('Importe !');}catch(err){toast('Erreur import !');}};rd.readAsText(f);e.target.value='';}

function seed(){
  if(db.films.length||db.series.length||db.livres.length||db.jeux.length)return;
  db.films=[{id:'f1',title:'Dune: Part Two',meta:'Denis Villeneuve',releaseYear:'2024',genre:'SF',cover:'https://image.tmdb.org/t/p/w500/8b8R8l88Qje9dn9OE8PY05Nxl1X.jpg',scores:{histoire:7.5,acting:3.5,musique:3,visuel:3,rythme:1.5},seen:true,seenDate:'2024-03-10',heart:true,addedAt:Date.now()-5000},{id:'f2',title:'Oppenheimer',meta:'Christopher Nolan',releaseYear:'2023',genre:'Drame',cover:'https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg',scores:{histoire:7,acting:4,musique:2.5,visuel:2.5,rythme:1.5},seen:true,seenDate:'2023-08-15',heart:false,addedAt:Date.now()-4000}];
  db.series=[{id:'s1',title:'Succession',meta:'Jesse Armstrong',releaseYear:'2018',genre:'Drame',cover:'https://image.tmdb.org/t/p/w500/e2X4jTMki6543EbrNmGBNYgmYB1.jpg',scores:{histoire:8,acting:4,musique:3,visuel:2.5,rythme:2},seen:true,seenDate:'2023-06-01',heart:true,seasons:[{watched:10,total:10},{watched:10,total:10},{watched:9,total:9},{watched:10,total:10}],addedAt:Date.now()-4000}];
  db.livres=[];db.jeux=[];saveDb();
}
seed();sw('films');
